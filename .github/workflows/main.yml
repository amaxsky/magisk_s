name: Magisk DiagGrab Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - ".github/workflows/main.yml"

jobs:
  build-diaggrab:
    name: Build Magisk DiagGrab
    runs-on: macos-15

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v6

      - name: Clone official Magisk
        run: |
          git clone --recursive https://github.com/topjohnwu/Magisk.git

      - name: Fix submodules
        run: |
          cd Magisk
          git submodule deinit -f .
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Fix permissions
        run: |
          cd Magisk
          chmod +x build.py
          chmod +x app/gradlew
          chmod +x scripts/*.sh || true

      - name: Install correct NDK
        run: |
          cd Magisk
          ./build.py ndk

      - name: Patch package name to com.simcom.diaggrab
        run: |
          cd Magisk
          export LC_ALL=C
          OLD="com.topjohnwu.magisk"
          NEW="com.simcom.diaggrab"

          echo "== 修改 AndroidManifest 包名 =="
          find . -name "AndroidManifest.xml" -print0 | xargs -0 sed -i.bak "s/$OLD/$NEW/g"

          echo "== 修改所有 Kotlin/Java 包名引用 =="
          find . -type f \( -name "*.kt" -o -name "*.java" \) -print0 | xargs -0 sed -i.bak "s/$OLD/$NEW/g"

          echo "== 修改 native 层包名引用 =="
          find native -type f -print0 | xargs -0 sed -i.bak "s/$OLD/$NEW/g"

          echo "== 自动重命名 Java 包路径（如果存在旧路径） =="
          if [ -d app/src/main/java/com/topjohnwu ]; then
            mkdir -p app/src/main/java/com/simcom/diaggrab
            rsync -a app/src/main/java/com/topjohnwu/magisk/ app/src/main/java/com/simcom/diaggrab/ || true
            rm -rf app/src/main/java/com/topjohnwu
          fi

          if [ -d app/stub/src/main/java/com/topjohnwu ]; then
            mkdir -p app/stub/src/main/java/com/simcom/diaggrab
            rsync -a app/stub/src/main/java/com/topjohnwu/magisk/ app/stub/src/main/java/com/simcom/diaggrab/ || true
            rm -rf app/stub/src/main/java/com/topjohnwu
          fi

          echo "== 修复 BuildConfig 引用 =="
          find . -type f -print0 | xargs -0 sed -i.bak "s/$OLD.BuildConfig/$NEW.BuildConfig/g"

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          is-asset-build: true

      - name: Build release
        run: cd Magisk && ./build.py -vr all

      - name: Build debug
        run: cd Magisk && ./build.py -v all

      - name: Stop gradle daemon
        run: cd Magisk && ./app/gradlew --stop

      - name: Upload DiagGrab artifacts
        uses: actions/upload-artifact@v6
        with:
          name: diaggrab-${{ github.sha }}
          path: Magisk/out
          compression-level: 9

      - name: Upload symbols
        uses: actions/upload-artifact@v6
        with:
          name: diaggrab-${{ github.sha }}-symbols
          path: Magisk/app/apk/build/outputs
          compression-level: 9
